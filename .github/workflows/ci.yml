name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        # Moodle 5.2 requires PostgreSQL >= 16 (its environment.xml block);
        # 16 also satisfies 5.0 (>= 14) and 5.1 (>= 15).
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        # All three supported branches require MariaDB >= 10.11.
        image: mariadb:10.11
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      # Lean, fully verified matrix (verified 2026-07-16 against each
      # branch's own environment.xml block and Moodle core's per-branch CI):
      # PHP support — 5.0: 8.2-8.4, 5.1: 8.2-8.4, 5.2: 8.3-8.4.
      # Diagonal covers every branch and PHP once; the extra pair covers the
      # classic breakage corner (newest PHP on oldest supported branch).
      matrix:
        include:
          - php: '8.2'
            moodle-branch: 'MOODLE_500_STABLE'
            database: 'pgsql'
          - php: '8.2'
            moodle-branch: 'MOODLE_500_STABLE'
            database: 'mariadb'
          - php: '8.3'
            moodle-branch: 'MOODLE_501_STABLE'
            database: 'pgsql'
          - php: '8.3'
            moodle-branch: 'MOODLE_501_STABLE'
            database: 'mariadb'
          - php: '8.4'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'pgsql'
          - php: '8.4'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'mariadb'
          - php: '8.4'
            moodle-branch: 'MOODLE_500_STABLE'
            database: 'pgsql'
          - php: '8.4'
            moodle-branch: 'MOODLE_500_STABLE'
            database: 'mariadb'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install moodle-plugin-ci
        # tiny_chemjax declares a hard dependency on filter_chemjax
        # (version.php $plugin->dependencies), so the filter must be present
        # in the CI site for install/PHPUnit/Behat to work.
        run: |
          moodle-plugin-ci add-plugin adamjenkins/moodle-filter_chemjax
          moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true # This step will show errors but will not fail
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        # Each Moodle branch's JS toolchain minifies differently, so the
        # committed amd/build bundle only matches the branch it was built
        # with. The bundle is built with MOODLE_502_STABLE; gate the
        # stale-build check to that branch.
        if: ${{ !cancelled() && matrix.moodle-branch == 'MOODLE_502_STABLE' }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        id: behat
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome --scss-deprecations

      - name: Upload Behat Faildump
        if: ${{ failure() && steps.behat.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: Behat Faildump (${{ join(matrix.*, ', ') }})
          path: ${{ github.workspace }}/moodledata/behat_dump
          retention-days: 7
          if-no-files-found: ignore

      - name: Mark cancelled jobs as failed.
        if: ${{ cancelled() }}
        run: exit 1
